# Cloudflare configuration for ZOL-OIL (Cloudflare Pages, nitro "cloudflare-pages").
#
# The D1 + R2 bindings are intentionally NOT declared yet: the app currently uses
# Supabase for data/images, and Cloudflare rejects a deploy that binds a D1
# database with a placeholder/invalid UUID. They will be added in the D1/R2 phase
# AFTER the resources are created — see docs/CLOUDFLARE_DEPLOYMENT.md and
# docs/CLOUDFLARE_MIGRATION_PLAN.md.

name = "zol-oil"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "dist"

# ── ENABLE IN THE D1/R2 PHASE (after `wrangler d1 create` / `r2 bucket create`) ──
# [[d1_databases]]
# binding = "DB"
# database_name = "zol-oil"
# database_id = "PASTE_REAL_D1_UUID_HERE"
# migrations_dir = "migrations/d1"
#
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "zol-oil-images"
#
# [vars]
# # Custom image-delivery base URL (attach a custom domain to the bucket; no r2.dev in prod).
# R2_PUBLIC_BASE_URL = "https://img.zol-oil.ro"

# Secrets/vars (RESEND_API_KEY, NOTIFY_EMAIL, ACCESS_TEAM_DOMAIN, ACCESS_AUD,
# ADMIN_EMAILS) are set in the Pages dashboard / `.dev.vars`, not here.
