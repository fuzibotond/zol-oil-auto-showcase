# Cloudflare configuration for ZOL-OIL (Cloudflare Pages, nitro "cloudflare-pages").
#
# The app now runs on Cloudflare D1 (data) + R2 (images) — these bindings are
# REQUIRED. They stay commented ONLY because a placeholder database_id makes the
# Pages deploy fail (Error 8000022). To go live:
#   1. wrangler d1 create zol-oil        → paste the returned UUID below
#   2. wrangler r2 bucket create zol-oil-images
#   3. uncomment the blocks below, then deploy
# See docs/CLOUDFLARE_DEPLOYMENT.md for the full sequence (incl. migrations + data import).

name = "zol-oil"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "dist"

# ── REQUIRED — uncomment after creating the resources ───────────────────────────
# [[d1_databases]]
# binding = "DB"
# database_name = "zol-oil"
# database_id = "PASTE_REAL_D1_UUID_HERE"
# migrations_dir = "migrations/d1"
#
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "zol-oil-images"
#
# [vars]
# # Custom image-delivery base URL (attach a custom domain to the bucket; no r2.dev in prod).
# # If omitted, images are served same-origin via the /img/<key> route.
# R2_PUBLIC_BASE_URL = "https://img.zol-oil.ro"

# Secrets/vars (RESEND_API_KEY, NOTIFY_EMAIL, ACCESS_TEAM_DOMAIN, ACCESS_AUD,
# ADMIN_EMAILS) are set in the Pages dashboard / `.dev.vars`, not here.
